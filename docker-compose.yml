version: '3.8'

services:
  # The Nginx Reverse Proxy & Static File Server
  nginx:
    image: nginx:alpine
    container_name: finshield-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped

  # The Node.js Express Backend
  backend:
    build:
      context: ./backend
    container_name: finshield-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=finshield_root_pass
      - DB_NAME=finshield
      - JWT_SECRET=super_secret_finshield_key_2026
    depends_on:
      - db
    restart: unless-stopped

  # The MySQL Database
  db:
    image: mysql:8.0
    container_name: finshield-db
    environment:
      - MYSQL_ROOT_PASSWORD=finshield_root_pass
      - MYSQL_DATABASE=finshield
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    restart: unless-stopped

volumes:
  db-data:
