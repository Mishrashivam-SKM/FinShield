<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinShield Insurance Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">FinShield Cloud</div>
      <div class="nav-links">
        <a href="#" id="link-dashboard">Dashboard</a>
        <a href="#" id="link-policies">Policies</a>
        <button id="btn-logout" style="display:none;">Logout</button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content" class="container">
      <!-- Login View -->
      <section id="login-view" class="view active">
        <div class="card login-card">
          <h2>Sign In</h2>
          <form id="login-form">
            <div class="form-group">
              <label>Username</label>
              <input type="text" id="username" required>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
            <p id="login-error" class="error-msg"></p>
          </form>
        </div>
      </section>

      <!-- Dashboard View -->
      <section id="dashboard-view" class="view" style="display:none;">
        <h2>System Dashboard</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <h3>Total Policies</h3>
            <p id="stat-policies">--</p>
          </div>
          <div class="stat-card">
            <h3>Active Claims</h3>
            <p id="stat-claims">--</p>
          </div>
        </div>
      </section>

      <!-- Policies View -->
      <section id="policies-view" class="view" style="display:none;">
        <h2>Manage Policies</h2>
        <table class="table">
          <thead>
            <tr>
              <th>Policy Number</th>
              <th>Holder Name</th>
              <th>Type</th>
              <th>Premium</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="policies-table-body">
            <!-- Populated via JS -->
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
